name: Update GU Stats

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch: {}       # allow manual run

permissions:
  contents: write             # to commit videos.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright requests Pillow
          playwright install --with-deps chromium

      - name: Fetch fresh data (videos.json + followers.json)
        env:
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
          IG_COOKIES_JSON: ${{ secrets.IG_COOKIES_JSON }}
        run: python3 -c "import asyncio, fetch_and_push; asyncio.run(fetch_and_push.main_fetch())"

      - name: Track drops vs peaks
        run: python3 track_drops.py

      - name: Push to Tidbyts (with drop alerts if any)
        env:
          TIDBYT_KEY_1: ${{ secrets.TIDBYT_KEY_1 }}
          TIDBYT_KEY_2: ${{ secrets.TIDBYT_KEY_2 }}
        run: python3 -c "import fetch_and_push; fetch_and_push.push_to_tidbyt()"

      - name: Commit updated JSON
        run: |
          git config user.name "GU Stats Bot"
          git config user.email "bot@github.com"
          git add videos.json videos_neworder.json followers.json peaks.json drops.md drops_current.json
          git diff --cached --quiet && exit 0
          # v2: robust push - save files, fetch+reset to latest remote, restore, recommit
          for f in videos.json videos_neworder.json followers.json peaks.json drops.md drops_current.json; do
            [ -f "$f" ] && cp "$f" "/tmp/gu_${f//./_}"
          done
          for attempt in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            for f in videos.json videos_neworder.json followers.json peaks.json drops.md drops_current.json; do
              [ -f "/tmp/gu_${f//./_}" ] && cp "/tmp/gu_${f//./_}" "$f"
            done
            git add videos.json videos_neworder.json followers.json peaks.json drops.md drops_current.json
            git diff --cached --quiet && exit 0
            git commit -m "Update stats $(date -u +%H:%M)"
            git push && exit 0
            echo "Push attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          exit 1
